<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruchi Tarangam - Waves of Flavors</title>
    <style>
        :root {
            --primary-color: #d32f2f; 
            --accent-color: #25D366;  
            --bg-color: #fdfaf6;
            --card-bg: #ffffff;
            --text-dark: #333333;
        }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
            color: var(--text-dark);
            line-height: 1.6;
            padding-bottom: 60px;
        }
        
        header { 
            background-color: var(--primary-color); 
            color: white; 
            padding: 30px 20px 20px 20px; 
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo-placeholder {
            width: 90px;
            height: 90px;
            background-color: #fff;
            border-radius: 50%;
            margin: 0 auto 12px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .logo-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 1px; }
        header p { margin: 5px 0 0 0; font-size: 1.2rem; opacity: 0.95; font-style: italic; }

        /* Unified Navigation & Search Bar */
        nav {
            background-color: #2c2c2c;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: table;
            width: 100%;
        }

        .nav-menu-wrapper { display: table-cell; vertical-align: middle; }
        .nav-link {
            color: #efefef;
            text-decoration: none;
            padding: 18px 18px;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            font-size: 1rem;
            position: relative;
        }
        .nav-link:hover, .nav-link.active { background-color: var(--primary-color); color: white; }

        /* Pickle Dropdown Layout Rules */
        .dropdown-menu {
            display: none;
            position: absolute;
            background-color: #2c2c2c;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            top: 100%;
            left: 0;
            z-index: 2000;
        }
        .dropdown-menu div {
            color: #efefef;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .dropdown-menu div:hover { background-color: var(--primary-color); }
        .nav-link.has-dropdown:hover .dropdown-menu { display: block; }

        /* Navigation Utilities aligned right */
        .nav-utilities {
            display: table-cell;
            text-align: right;
            vertical-align: middle;
            padding-right: 15px;
        }

        .search-container { display: inline-block; position: relative; margin-right: 15px; }
        .search-box {
            padding: 8px 32px 8px 12px;
            border-radius: 20px;
            border: 1px solid #555;
            background-color: #444;
            color: white;
            outline: none;
            width: 180px;
            font-size: 0.9rem;
            transition: width 0.3s;
        }
        .search-box:focus { width: 230px; background-color: #fff; color: #000; border-color: var(--primary-color); }
        .search-icon-inside { position: absolute; right: 10px; top: 8px; color: #aaa; pointer-events: none; }

        .cart-trigger-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            display: inline-block;
        }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .category-section { display: block; margin-bottom: 45px; }
        .category-title { 
            color: #111; 
            padding: 12px 0; 
            margin: 20px 0; 
            font-size: 1.8rem;
            text-align: left;
            border-bottom: 3px solid var(--primary-color);
        }

        /* Product Grid Matrix Layout */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(285px, 1fr)); 
            gap: 22px; 
        }
        
        .product-card { 
            background: var(--card-bg); 
            padding: 22px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
            border: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-card h3 { margin: 0 0 15px 0; font-size: 1.25rem; color: #222; text-align: left; }
        .selector-group { display: flex; gap: 12px; margin-bottom: 15px; align-items: center; }
        select, input[type="number"] { padding: 10px; border: 1px solid #cccccc; border-radius: 6px; font-size: 0.95rem; outline: none; background-color: #fafafa; }
        select { flex: 2; width: 100%; cursor: pointer; }
        input[type="number"] { flex: 1; width: 55px; text-align: center; }
        
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            border-top: 1px dashed #e2e2e2;
            padding-top: 12px;
            margin-top: 5px;
        }
        .unit-price { color: #555555; font-size: 0.95rem; font-weight: normal; }
        .total-item-price { color: var(--primary-color); }

        /* Slideout Cart Drawer Layout */
        .cart-drawer-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 5000;
        }
        .cart-drawer {
            position: fixed;
            top: 0; right: -400px;
            width: 100%; max-width: 400px; height: 100%;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            z-index: 5001;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .cart-drawer.open { right: 0; }
        .
